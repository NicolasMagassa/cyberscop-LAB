server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /404.html;
    }

    # Sécurité : désactiver la version de Nginx dans les en-têtes de réponse (Information Disclosure)
    server_tokens off;

    # En-têtes de sécurité de base (OWASP / GRC Hardening)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:1337;" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
